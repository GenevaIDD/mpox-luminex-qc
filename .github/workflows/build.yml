name: Build App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[build]"

      - name: Generate icons
        run: python scripts/make_icon.py

      - name: Build macOS .app
        run: python -m PyInstaller mpox-luminex-qc.spec --clean -y

      - name: Codesign (ad-hoc)
        run: codesign --force --deep --sign - "dist/MPXV Luminex QC.app"

      - name: Create zip archive
        run: |
          cd dist
          zip -r "MPXV-Luminex-QC-macOS.zip" "MPXV Luminex QC.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MPXV-Luminex-QC-macOS
          path: dist/MPXV-Luminex-QC-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[build]"

      - name: Generate icons
        run: python scripts/make_icon.py

      - name: Build Windows exe
        run: python -m PyInstaller mpox-luminex-qc-win.spec --clean -y

      - name: Create zip archive
        run: Compress-Archive -Path "dist/MPXV-Luminex-QC" -DestinationPath "dist/MPXV-Luminex-QC-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MPXV-Luminex-QC-Windows
          path: dist/MPXV-Luminex-QC-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/MPXV-Luminex-QC-macOS/MPXV-Luminex-QC-macOS.zip
            artifacts/MPXV-Luminex-QC-Windows/MPXV-Luminex-QC-Windows.zip
